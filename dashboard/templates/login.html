<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — Momentum Terminal</title>
<style>
  :root{--bg:#070a10;--panel:#0e131c;--panel2:#121925;--line:#1d2634;
    --txt:#dfe6f0;--muted:#69768c;--gold:#e8b54b;--teal:#3fcabc;--red:#ff5d6c;
    --mono:"SFMono-Regular",ui-monospace,Menlo,Consolas,monospace;
    --sans:"Inter",-apple-system,"Segoe UI",Roboto,Arial,sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;display:grid;place-items:center;font-family:var(--sans);color:var(--txt);
    background:
      radial-gradient(800px 500px at 80% -10%,rgba(232,181,75,.08),transparent 60%),
      radial-gradient(700px 600px at -5% 110%,rgba(63,202,188,.06),transparent 55%),
      var(--bg);}
  .card{width:360px;background:linear-gradient(180deg,var(--panel),#0a0e15);
    border:1px solid var(--line);border-radius:18px;padding:34px 30px;
    box-shadow:0 1px 0 rgba(255,255,255,.04) inset,0 24px 60px rgba(0,0,0,.5)}
  .brand{display:flex;align-items:center;gap:12px;margin-bottom:26px}
  .mark{width:40px;height:40px;border-radius:11px;background:linear-gradient(145deg,var(--gold),#b9842a);
    display:grid;place-items:center;color:#1a130a}
  .mark svg{width:23px;height:23px}
  .brand b{font-size:16px;font-weight:650;letter-spacing:.2px;line-height:1.1}
  .brand small{display:block;color:var(--muted);font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;margin-top:2px}
  h1{font-size:15px;font-weight:600;margin-bottom:4px}
  .sub{color:var(--muted);font-size:12px;margin-bottom:22px}
  label{display:block;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.1em;margin:0 0 7px}
  .field{position:relative;margin-bottom:16px}
  .field svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--muted)}
  input{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--txt);
    padding:11px 12px 11px 38px;border-radius:10px;font-size:13.5px;font-family:var(--sans)}
  input:focus{outline:none;border-color:var(--gold)}
  button{width:100%;margin-top:8px;background:linear-gradient(145deg,var(--gold),#cf9a36);color:#1a130a;
    border:none;padding:12px;border-radius:10px;font:inherit;font-weight:700;font-size:13.5px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:8px}
  button:hover{filter:brightness(1.06)}
  button svg{width:16px;height:16px}
  .err{background:rgba(255,93,108,.1);border:1px solid rgba(255,93,108,.3);color:#ff8a95;
    font-size:12.5px;padding:10px 13px;border-radius:9px;margin-bottom:18px;display:flex;align-items:center;gap:8px}
  .err svg{width:15px;height:15px;flex:none}
  .foot{margin-top:22px;text-align:center;color:#3a4658;font-size:11px}
</style>
</head>
<body>
  <form class="card" method="post" action="/login">
    <div class="brand">
      <span class="mark"><svg viewBox="0 0 24 24" fill="none"><path d="M3 17l5-6 4 4 6-8" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 21h18" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg></span>
      <span><b>Momentum</b><small>Terminal</small></span>
    </div>
    <h1>Sign in</h1>
    <div class="sub">Authorized access only.</div>

    {% if error %}
    <div class="err">
      <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.7"/><path d="M12 8v5m0 3h.01" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      {{ error }}
    </div>
    {% endif %}

    <label for="username">Username</label>
    <div class="field">
      <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="3.5" stroke="currentColor" stroke-width="1.7"/><path d="M5 20a7 7 0 0 1 14 0" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
      <input id="username" name="username" autocomplete="username" required autofocus>
    </div>

    <label for="password">Password</label>
    <div class="field">
      <svg viewBox="0 0 24 24" fill="none"><rect x="4" y="10" width="16" height="10" rx="2" stroke="currentColor" stroke-width="1.7"/><path d="M8 10V7a4 4 0 0 1 8 0v3" stroke="currentColor" stroke-width="1.7"/></svg>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
    </div>

    <button type="submit">
      <svg viewBox="0 0 24 24" fill="none"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M10 17l5-5-5-5M15 12H3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Sign in
    </button>
    <div class="foot">Penny-Stock Momentum Bot</div>
  </form>
</body>
</html>
